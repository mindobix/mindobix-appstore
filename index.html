<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindobix · App Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #07080e;
      --bg2:           #0b0d16;
      --surface:       #0d0f1a;
      --surface2:      #111420;
      --surface3:      #161928;
      --border:        rgba(255,255,255,0.06);
      --border2:       rgba(255,255,255,0.1);
      --border3:       rgba(255,255,255,0.16);
      --text:          #eef0ff;
      --text2:         #8890b8;
      --muted:         #4a5080;
      --dim:           #252840;
      --accent:        #5b5ef4;
      --accent-glow:   rgba(91,94,244,0.22);
      --green:         #22c55e;
      --green-bg:      rgba(34,197,94,0.12);
      --green-border:  rgba(34,197,94,0.28);
      --radius-card:   20px;
      --radius-btn:    100px;
      --radius-icon:   14px;
      --topbar-h:      60px;
      --filter-h:      48px;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOPBAR ─────────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: var(--topbar-h);
      background: rgba(7,8,14,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
      padding: 0 28px;
    }

    .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    .brand-mark {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #5b5ef4, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: 0 0 18px rgba(91,94,244,0.45);
    }

    .brand-name {
      font-size: 15px; font-weight: 800; letter-spacing: -0.02em;
    }
    .brand-sub {
      font-size: 10px; font-weight: 600; color: var(--muted);
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    .search-wrap {
      flex: 1; max-width: 340px; margin: 0 auto; position: relative;
    }
    .search-ico {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); color: var(--muted); font-size: 13px;
      pointer-events: none;
    }
    #search {
      width: 100%; height: 36px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--radius-btn);
      padding: 0 14px 0 34px;
      font: 500 13px/1 'Inter', sans-serif; color: var(--text);
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .btn-icon {
      width: 34px; height: 34px; border-radius: 10px;
      border: 1px solid var(--border2); background: var(--surface2);
      color: var(--text2); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .btn-icon:hover { background: var(--surface3); border-color: var(--border3); color: var(--text); }
    .btn-icon.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FILTER BAR ─────────────────────────────────────────── */
    .filter-bar {
      position: sticky; top: var(--topbar-h); z-index: 90;
      height: var(--filter-h);
      background: rgba(7,8,14,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 4px;
      padding: 0 28px;
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-tab {
      height: 28px; padding: 0 14px;
      border-radius: var(--radius-btn); border: 1px solid transparent;
      background: transparent; color: var(--text2);
      font: 600 11px/1 'Inter', sans-serif; letter-spacing: 0.04em;
      text-transform: uppercase; cursor: pointer; white-space: nowrap;
      transition: all .18s;
    }
    .filter-tab:hover { background: var(--surface2); color: var(--text); }
    .filter-tab.active {
      background: var(--surface2); border-color: var(--border2); color: var(--text);
    }
    .filter-divider {
      width: 1px; height: 18px;
      background: var(--border2); flex-shrink: 0; margin: 0 4px;
    }

    /* ── MAIN ───────────────────────────────────────────────── */
    .main { max-width: 1100px; margin: 0 auto; padding: 36px 28px 80px; }

    /* ── STATUS BAR ─────────────────────────────────────────── */
    .status-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; margin-bottom: 32px;
      font-size: 12px; color: var(--text2); font-weight: 500;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0; animation: pulse-dot 2s ease-in-out infinite;
    }
    .status-dot.green  { background: var(--green);  box-shadow: 0 0 8px var(--green); animation: none; }
    .status-dot.yellow { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; animation: none; }
    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(.75); }
    }

    /* ── SECTION ────────────────────────────────────────────── */
    .section-header {
      display: flex; align-items: baseline;
      justify-content: space-between; margin-bottom: 18px;
    }
    .section-title { font-size: 20px; font-weight: 800; letter-spacing: -0.03em; }
    .section-count { font-size: 12px; color: var(--muted); font-weight: 500; }

    /* ── FEATURED STRIP ─────────────────────────────────────── */
    .featured-strip {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px; margin-bottom: 48px;
    }

    .featured-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-card); padding: 22px;
      display: flex; flex-direction: column; gap: 14px;
      position: relative; overflow: hidden;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      animation: card-in .35s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .featured-card::before {
      content: ''; position: absolute; inset: 0;
      border-radius: var(--radius-card);
      background: radial-gradient(ellipse at top left, var(--card-glow, transparent) 0%, transparent 60%);
      pointer-events: none; transition: opacity .2s;
    }
    .featured-card:hover {
      transform: translateY(-2px); border-color: var(--border2);
      box-shadow: 0 16px 48px rgba(0,0,0,.55);
    }

    .fc-top { display: flex; align-items: flex-start; gap: 14px; }
    .fc-icon {
      width: 54px; height: 54px; border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .fc-meta { flex: 1; min-width: 0; }
    .fc-eyebrow {
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
    }
    .fc-name { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 2px; }
    .fc-cat  { font-size: 11px; color: var(--text2); font-weight: 500; }
    .fc-desc { font-size: 12px; color: var(--text2); line-height: 1.65; }
    .fc-footer {
      display: flex; align-items: center;
      justify-content: space-between; margin-top: auto;
    }

    /* ── APP GRID ───────────────────────────────────────────── */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    /* ── APP CARD ───────────────────────────────────────────── */
    .app-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-card); padding: 18px;
      display: flex; flex-direction: column; gap: 11px;
      position: relative; overflow: hidden;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      animation: card-in .32s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes card-in {
      from { opacity:0; transform:translateY(12px) scale(.97); }
      to   { opacity:1; transform:translateY(0)    scale(1); }
    }
    .app-card::before {
      content: ''; position: absolute; inset: 0;
      border-radius: var(--radius-card);
      background: radial-gradient(ellipse at top left, var(--card-glow, transparent) 0%, transparent 55%);
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .app-card:hover { transform: translateY(-2px); border-color: var(--border2); box-shadow: 0 12px 36px rgba(0,0,0,.5); }
    .app-card:hover::before { opacity: 1; }
    .app-card.is-installed { border-color: var(--green-border); }

    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
    }
    .app-icon {
      width: 50px; height: 50px; border-radius: var(--radius-icon);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }

    .badge-installed {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--green-bg); border: 1px solid var(--green-border);
      border-radius: var(--radius-btn); padding: 3px 9px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--green); white-space: nowrap;
    }
    .badge-dot {
      width: 5px; height: 5px; background: var(--green);
      border-radius: 50%; box-shadow: 0 0 5px var(--green);
    }

    .card-name { font-size: 15px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2; }
    .card-cat  { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
    .card-desc {
      font-size: 12px; color: var(--text2); line-height: 1.65;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-footer {
      display: flex; align-items: center;
      justify-content: space-between; margin-top: auto; padding-top: 2px;
    }
    .card-meta { font-size: 10px; color: var(--muted); font-weight: 500; display: flex; gap: 8px; }

    /* ── BUTTONS ────────────────────────────────────────────── */
    .btn-open {
      height: 30px; padding: 0 14px;
      background: var(--green-bg); border: 1px solid var(--green-border);
      border-radius: var(--radius-btn); color: var(--green);
      font: 700 11px/1 'Inter',sans-serif; letter-spacing: 0.04em;
      cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
      transition: all .2s; white-space: nowrap;
    }
    .btn-open:hover {
      background: rgba(34,197,94,.22); border-color: rgba(34,197,94,.5);
      box-shadow: 0 0 14px rgba(34,197,94,.2); transform: translateY(-1px);
    }

    .btn-get {
      height: 30px; padding: 0 14px;
      background: rgba(91,94,244,.1); border: 1px solid rgba(91,94,244,.3);
      border-radius: var(--radius-btn); color: #818cf8;
      font: 700 11px/1 'Inter',sans-serif; letter-spacing: 0.04em;
      cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
      transition: all .2s; white-space: nowrap;
    }
    .btn-get:hover {
      background: rgba(91,94,244,.18); border-color: rgba(91,94,244,.5);
      box-shadow: 0 0 14px rgba(91,94,244,.2); transform: translateY(-1px);
    }

    .btn-try {
      height: 30px; padding: 0 14px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--radius-btn); color: var(--text2);
      font: 700 11px/1 'Inter',sans-serif; cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
      transition: all .2s; white-space: nowrap;
    }
    .btn-try:hover { background: var(--surface3); border-color: var(--border3); color: var(--text); }

    /* ── SKELETON ───────────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -500px 0; }
      100% { background-position:  500px 0; }
    }
    .skel {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 1000px 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 8px;
    }
    .skel-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-card); padding: 18px;
      display: flex; flex-direction: column; gap: 11px;
    }

    /* ── CLONE MODAL ────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0 16px 24px;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .clone-sheet {
      width: 100%; max-width: 520px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 24px; padding: 26px;
      transform: translateY(32px);
      transition: transform .3s cubic-bezier(0.34,1.56,0.64,1);
      display: flex; flex-direction: column; gap: 18px;
    }
    .overlay.open .clone-sheet { transform: translateY(0); }

    .sheet-head { display: flex; align-items: center; gap: 14px; }
    .sheet-icon {
      width: 50px; height: 50px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;
    }
    .sheet-name { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; }
    .sheet-cat  { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .sheet-close {
      margin-left: auto; width: 28px; height: 28px; border-radius: 50%;
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--text2); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: all .18s;
    }
    .sheet-close:hover { background: var(--dim); color: var(--text); }

    .clone-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .clone-row {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 14px; padding: 13px 15px;
      display: flex; align-items: center; gap: 12px;
    }
    .clone-cmd {
      font: 500 12px/1.6 'SF Mono','Fira Code',monospace;
      color: #a5b4fc; flex: 1; word-break: break-all;
    }
    .btn-copy {
      height: 30px; padding: 0 13px;
      background: var(--surface3); border: 1px solid var(--border2);
      border-radius: 8px; color: var(--text2);
      font: 600 11px/1 'Inter',sans-serif; cursor: pointer; white-space: nowrap;
      display: flex; align-items: center; gap: 5px; transition: all .2s;
    }
    .btn-copy:hover { background: var(--dim); color: var(--text); }
    .btn-copy.copied { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }

    .sheet-links { display: flex; gap: 10px; }
    .btn-gh {
      flex: 1; height: 38px; border-radius: 12px;
      border: 1px solid var(--border2); background: var(--surface3);
      color: var(--text2); font: 600 12px/1 'Inter',sans-serif;
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all .2s;
    }
    .btn-gh:hover { background: var(--dim); color: var(--text); }

    /* ── TOAST ──────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(18px);
      background: var(--surface3); border: 1px solid var(--border2);
      border-radius: var(--radius-btn); padding: 9px 20px;
      font: 600 12px/1 'Inter',sans-serif; color: var(--text);
      box-shadow: 0 8px 30px rgba(0,0,0,.5); z-index: 300;
      opacity: 0; pointer-events: none;
      transition: all .3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── EMPTY STATE ────────────────────────────────────────── */
    .empty {
      grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-icon { font-size: 44px; margin-bottom: 14px; }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text2); }
    .empty-sub   { font-size: 12px; margin-top: 6px; }

    /* ── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 700px) {
      .topbar, .filter-bar, .main { padding-left: 16px; padding-right: 16px; }
      .brand-sub { display: none; }
      .apps-grid { grid-template-columns: 1fr; }
      .featured-strip { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── TOPBAR ──────────────────────────────────────────────── -->
<header class="topbar">
  <div class="brand">
    <div class="brand-mark">⚡</div>
    <div>
      <div class="brand-name">Mindobix</div>
      <div class="brand-sub">App Store</div>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input id="search" type="search" placeholder="Search apps…" autocomplete="off" />
  </div>

  <div class="topbar-right">
    <button class="btn-icon" id="btn-refresh" title="Refresh">↻</button>
  </div>
</header>

<!-- ── FILTER BAR ───────────────────────────────────────────── -->
<div class="filter-bar" id="filter-bar">
  <button class="filter-tab active" data-filter="all">All</button>
  <button class="filter-tab" data-filter="installed">Installed</button>
  <button class="filter-tab" data-filter="available">Available</button>
  <!-- category tabs injected dynamically -->
</div>

<!-- ── MAIN ─────────────────────────────────────────────────── -->
<main class="main">

  <div id="status-bar" class="status-bar" style="display:none">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text"></span>
  </div>

  <section id="featured-section" style="display:none">
    <div class="section-header">
      <h2 class="section-title">Featured</h2>
    </div>
    <div id="featured-strip" class="featured-strip"></div>
  </section>

  <section id="all-section">
    <div class="section-header">
      <h2 class="section-title" id="grid-title">All Apps</h2>
      <span class="section-count" id="grid-count"></span>
    </div>
    <div id="apps-grid" class="apps-grid"></div>
  </section>

</main>

<!-- ── CLONE SHEET ───────────────────────────────────────────── -->
<div class="overlay" id="overlay">
  <div class="clone-sheet">
    <div class="sheet-head">
      <div class="sheet-icon" id="s-icon"></div>
      <div>
        <div class="sheet-name" id="s-name"></div>
        <div class="sheet-cat"  id="s-cat"></div>
      </div>
      <button class="sheet-close" id="s-close">✕</button>
    </div>

    <div>
      <div class="clone-label">Clone command</div>
      <div class="clone-row">
        <div class="clone-cmd" id="s-cmd"></div>
        <button class="btn-copy" id="btn-copy">📋 Copy</button>
      </div>
    </div>

    <div class="sheet-links">
      <a class="btn-gh" id="s-gh" href="#" target="_blank" rel="noopener">🐙 View on GitHub</a>
    </div>
  </div>
</div>

<!-- ── TOAST ─────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────────────────
const GITHUB_USER = 'mindobix';
const API_URL     = `https://api.github.com/users/${GITHUB_USER}/repos?per_page=100&sort=updated&type=public`;
const SELF        = 'mindbox-appstore';

// Repos to hide from the store (non-launchable / meta)
const EXCLUDED = new Set(['mindobix-website']);

// Rich metadata for known repos
const META = {
  'local-trading-journal':           { icon:'📈', color:'#10b981', bg:'rgba(16,185,129,.15)',  cat:'Finance',      featured:true  },
  'local-vibecoding-appideas':       { icon:'💡', color:'#8b5cf6', bg:'rgba(139,92,246,.15)',  cat:'Productivity', featured:true  },
  'MyCareerPulse':                   { icon:'🧠', color:'#8b5cf6', bg:'rgba(139,92,246,.15)',  cat:'AI · Career',  featured:true  },
  'local-my-pwds-keys':              { icon:'🔐', color:'#6366f1', bg:'rgba(99,102,241,.15)',  cat:'Security',     featured:true  },
  'medreview':                       { icon:'🩺', color:'#0ea5e9', bg:'rgba(14,165,233,.15)',  cat:'Medical',      featured:true  },
  'local-api-web-proxy':             { icon:'🔭', color:'#6366f1', bg:'rgba(99,102,241,.15)',  cat:'Dev Tools',    featured:false },
  'local-shareanyjson':              { icon:'🗂️', color:'#0ea5e9', bg:'rgba(14,165,233,.15)', cat:'Dev Tools',    featured:false },
  'local-filesync':                  { icon:'🔄', color:'#10b981', bg:'rgba(16,185,129,.15)',  cat:'Dev Tools',    featured:false },
  'local-keywords-files-finder':     { icon:'🔍', color:'#0ea5e9', bg:'rgba(14,165,233,.15)',  cat:'Search',       featured:false },
  'local-recipebook':                { icon:'🍳', color:'#f59e0b', bg:'rgba(245,158,11,.15)',  cat:'Lifestyle',    featured:false },
  'myfamilytree':                    { icon:'🌳', color:'#10b981', bg:'rgba(16,185,129,.15)',  cat:'Family',       featured:false },
  'local-billpay-tracker':           { icon:'💸', color:'#f43f5e', bg:'rgba(244,63,94,.15)',   cat:'Finance',      featured:false },
  'local-weekly-options-trade-plan': { icon:'📋', color:'#8b5cf6', bg:'rgba(139,92,246,.15)',  cat:'Finance',      featured:false },
  'local-habit-calendar':            { icon:'📅', color:'#6366f1', bg:'rgba(99,102,241,.15)',  cat:'Productivity', featured:false },
  'local-dailywealth':               { icon:'💰', color:'#f59e0b', bg:'rgba(245,158,11,.15)',  cat:'Finance',      featured:false },
};

const DISPLAY_NAMES = {
  'local-trading-journal':           'Trading Journal',
  'local-vibecoding-appideas':       'VibeCoding Ideas',
  'MyCareerPulse':                   'MyCareerPulse',
  'local-api-web-proxy':             'LocalApiWebProxy',
  'local-shareanyjson':              'ShareAnyJSON',
  'local-filesync':                  'Desktops FileSync',
  'local-keywords-files-finder':     'Keywords Files Finder',
  'local-recipebook':                'Recipe Book',
  'myfamilytree':                    'My Family Tree',
  'local-billpay-tracker':           'Monthly BillPay',
  'local-weekly-options-trade-plan': 'Weekly Options Trade Plan',
  'local-habit-calendar':            'Habit Calendar',
  'medreview':                       'MedReview',
  'local-my-pwds-keys':              'My Passwords & Keys',
  'local-dailywealth':               'Daily Wealth',
};

// ─────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────
let allRepos     = []; // [{ repo, status }]
let activeFilter = 'all';
let searchQuery  = '';

// ─────────────────────────────────────────────────────────────
//  GITHUB API
// ─────────────────────────────────────────────────────────────
async function fetchRepos() {
  const res = await fetch(API_URL, {
    headers: { Accept: 'application/vnd.github.v3+json' }
  });
  if (!res.ok) {
    const left = res.headers.get('X-RateLimit-Remaining');
    if (left === '0') throw new Error('GitHub API rate limit hit — try again in an hour.');
    throw new Error(`GitHub returned ${res.status}`);
  }
  const repos = await res.json();
  return repos.filter(r => !r.fork && !r.archived && !EXCLUDED.has(r.name) && r.name !== SELF);
}

// ─────────────────────────────────────────────────────────────
//  CLONE DETECTION  (HEAD fetch to sibling directory)
// ─────────────────────────────────────────────────────────────
async function detectStatus(repoName) {
  try {
    const res = await fetch(`../${repoName}/index.html`, { method:'HEAD', cache:'no-store' });
    return res.ok ? 'installed' : 'not-installed';
  } catch {
    return 'unknown'; // file:// limitation or network error
  }
}

async function detectAll(repos) {
  const results = await Promise.allSettled(
    repos.map(r => detectStatus(r.name).then(s => [r.name, s]))
  );
  return Object.fromEntries(
    results.filter(r => r.status === 'fulfilled').map(r => r.value)
  );
}

// ─────────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────────
function getMeta(name) {
  return META[name] || { icon:'📦', color:'#6b7090', bg:'rgba(107,112,144,.15)', cat:'App', featured:false };
}

function getDisplayName(name) {
  if (DISPLAY_NAMES[name]) return DISPLAY_NAMES[name];
  return name.replace(/^local-/,'').replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
}

function timeAgo(iso) {
  const s = (Date.now() - new Date(iso)) / 1000;
  if (s < 3600)    return `${Math.floor(s/60)}m ago`;
  if (s < 86400)   return `${Math.floor(s/3600)}h ago`;
  if (s < 2592000) return `${Math.floor(s/86400)}d ago`;
  return `${Math.floor(s/2592000)}mo ago`;
}

// ─────────────────────────────────────────────────────────────
//  ACTION BUTTON HTML
// ─────────────────────────────────────────────────────────────
function actionBtn(repo, status) {
  if (status === 'installed')
    return `<a class="btn-open" href="../${repo.name}/index.html" target="_blank" rel="noopener">Open ↗</a>`;
  if (status === 'not-installed')
    return `<button class="btn-get" data-repo="${repo.name}">Get ↓</button>`;
  return `<a class="btn-try" href="../${repo.name}/index.html" target="_blank" rel="noopener">Try ↗</a>`;
}

// ─────────────────────────────────────────────────────────────
//  SKELETON CARDS
// ─────────────────────────────────────────────────────────────
function skeletonCards(n) {
  return Array.from({length:n}, () => `
    <div class="skel-card">
      <div class="skel" style="width:50px;height:50px;border-radius:14px"></div>
      <div class="skel" style="height:13px;width:65%"></div>
      <div class="skel" style="height:11px;width:35%"></div>
      <div class="skel" style="height:38px"></div>
      <div class="skel" style="height:30px;width:72px;border-radius:100px;margin-left:auto"></div>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────────────────────
//  RENDER APP CARD
// ─────────────────────────────────────────────────────────────
function renderCard(repo, status, delay=0) {
  const m = getMeta(repo.name);
  const badge = status === 'installed'
    ? `<div class="badge-installed"><span class="badge-dot"></span>Installed</div>` : '';
  const stars = repo.stargazers_count > 0 ? `★ ${repo.stargazers_count}` : '';
  return `
    <div class="app-card ${status==='installed'?'is-installed':''}"
         style="--card-glow:${m.bg.replace('.15','.07')};animation-delay:${delay}ms"
         data-repo="${repo.name}" data-status="${status}" data-cat="${m.cat}"
         data-search="${repo.name.toLowerCase()} ${getDisplayName(repo.name).toLowerCase()} ${(repo.description||'').toLowerCase()} ${m.cat.toLowerCase()}">
      <div class="card-top">
        <div class="app-icon" style="background:${m.bg}">${m.icon}</div>
        ${badge}
      </div>
      <div>
        <div class="card-name">${getDisplayName(repo.name)}</div>
        <div class="card-cat">${m.cat}</div>
      </div>
      <div class="card-desc">${repo.description || 'A local web app from Mindobix.'}</div>
      <div class="card-footer">
        <div class="card-meta">
          ${stars ? `<span>${stars}</span>` : ''}
          <span>${timeAgo(repo.updated_at)}</span>
        </div>
        ${actionBtn(repo, status)}
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────
//  RENDER FEATURED CARD
// ─────────────────────────────────────────────────────────────
function renderFeatured(repo, status) {
  const m = getMeta(repo.name);
  const stars = repo.stargazers_count > 0 ? `★ ${repo.stargazers_count} · ` : '';
  return `
    <div class="featured-card" style="--card-glow:${m.bg.replace('.15','.1')}">
      <div class="fc-top">
        <div class="fc-icon" style="background:${m.bg}">${m.icon}</div>
        <div class="fc-meta">
          <div class="fc-eyebrow">Featured</div>
          <div class="fc-name">${getDisplayName(repo.name)}</div>
          <div class="fc-cat">${m.cat}</div>
        </div>
      </div>
      <div class="fc-desc">${repo.description || 'A local web app from Mindobix.'}</div>
      <div class="fc-footer">
        <div class="card-meta">${stars}${timeAgo(repo.updated_at)}</div>
        ${actionBtn(repo, status)}
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────
//  FILTER & RENDER
// ─────────────────────────────────────────────────────────────
function getFiltered() {
  return allRepos.filter(({ repo, status }) => {
    const m = getMeta(repo.name);
    if (activeFilter === 'installed'    && status !== 'installed')     return false;
    if (activeFilter === 'available'    && status === 'installed')     return false;
    if (activeFilter !== 'all' && activeFilter !== 'installed' && activeFilter !== 'available') {
      if (m.cat !== activeFilter) return false;
    }
    if (searchQuery) {
      const el = document.querySelector(`[data-repo="${repo.name}"]`);
      const haystack = el ? el.dataset.search
        : `${repo.name} ${getDisplayName(repo.name)} ${repo.description||''} ${m.cat}`.toLowerCase();
      if (!haystack.includes(searchQuery.toLowerCase())) return false;
    }
    return true;
  });
}

function renderAll() {
  const filtered    = getFiltered();
  const showFeatured = activeFilter === 'all' && !searchQuery;
  const featuredSet  = new Set(allRepos.filter(r => getMeta(r.repo.name).featured).map(r => r.repo.name));

  // Featured strip
  const featuredSec = document.getElementById('featured-section');
  if (showFeatured) {
    const featuredItems = allRepos.filter(r => featuredSet.has(r.repo.name));
    document.getElementById('featured-strip').innerHTML =
      featuredItems.slice(0,3).map(({ repo, status }) => renderFeatured(repo, status)).join('');
    featuredSec.style.display = '';
  } else {
    featuredSec.style.display = 'none';
  }

  // Grid title
  const titleMap = { all:'All Apps', installed:'Installed', available:'Available' };
  document.getElementById('grid-title').textContent = titleMap[activeFilter] || `${activeFilter} Apps`;

  // Grid items — when showing "all", exclude featured from grid so they don't duplicate
  const gridItems = showFeatured
    ? filtered.filter(({ repo }) => !featuredSet.has(repo.name))
    : filtered;

  document.getElementById('grid-count').textContent =
    `${filtered.length} app${filtered.length !== 1 ? 's' : ''}`;

  const grid = document.getElementById('apps-grid');
  if (gridItems.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>
      <div class="empty-title">No apps found</div>
      <div class="empty-sub">Try a different filter or search term</div></div>`;
  } else {
    grid.innerHTML = gridItems.map(({ repo, status }, i) => renderCard(repo, status, i * 28)).join('');
  }
}

// ─────────────────────────────────────────────────────────────
//  CATEGORY TABS
// ─────────────────────────────────────────────────────────────
function buildCategoryTabs(repos) {
  const bar  = document.getElementById('filter-bar');
  // remove old dynamic tabs
  bar.querySelectorAll('.filter-divider, [data-filter]:not([data-filter="all"]):not([data-filter="installed"]):not([data-filter="available"])')
     .forEach(el => el.remove());

  const cats = [...new Set(repos.map(r => getMeta(r.name).cat))].sort();
  const div  = document.createElement('div');
  div.className = 'filter-divider';
  bar.appendChild(div);
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className   = 'filter-tab';
    btn.dataset.filter = cat;
    btn.textContent = cat;
    btn.addEventListener('click', () => setFilter(cat));
    bar.appendChild(btn);
  });
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.filter === f));
  renderAll();
}

// ─────────────────────────────────────────────────────────────
//  STATUS BAR
// ─────────────────────────────────────────────────────────────
function setStatus(msg, type='') {
  document.getElementById('status-bar').style.display = 'flex';
  document.getElementById('status-dot').className  = `status-dot ${type}`;
  document.getElementById('status-text').textContent = msg;
}
function hideStatus() { document.getElementById('status-bar').style.display = 'none'; }

// ─────────────────────────────────────────────────────────────
//  CLONE SHEET
// ─────────────────────────────────────────────────────────────
function openSheet(repo) {
  const m   = getMeta(repo.name);
  const cmd = `git clone https://github.com/${GITHUB_USER}/${repo.name}.git`;

  const icon = document.getElementById('s-icon');
  icon.style.background = m.bg;
  icon.textContent = m.icon;
  document.getElementById('s-name').textContent = getDisplayName(repo.name);
  document.getElementById('s-cat').textContent  = m.cat;
  document.getElementById('s-cmd').textContent  = cmd;
  document.getElementById('s-gh').href          = repo.html_url;

  const copyBtn = document.getElementById('btn-copy');
  copyBtn.textContent = '📋 Copy';
  copyBtn.className   = 'btn-copy';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(cmd).then(() => {
      copyBtn.textContent = '✓ Copied!';
      copyBtn.className   = 'btn-copy copied';
      showToast('Clone command copied to clipboard');
      setTimeout(() => { copyBtn.textContent = '📋 Copy'; copyBtn.className = 'btn-copy'; }, 2200);
    });
  };

  document.getElementById('overlay').classList.add('open');
}
function closeSheet() { document.getElementById('overlay').classList.remove('open'); }

// ─────────────────────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('apps-grid').innerHTML      = skeletonCards(9);
  document.getElementById('featured-strip').innerHTML = skeletonCards(3);
  document.getElementById('featured-section').style.display = '';
  setStatus('Fetching repos from GitHub…');

  let repos;
  try {
    repos = await fetchRepos();
  } catch (err) {
    document.getElementById('apps-grid').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div>
       <div class="empty-title">Could not load repos</div>
       <div class="empty-sub">${err.message}</div></div>`;
    document.getElementById('featured-section').style.display = 'none';
    setStatus(err.message, 'yellow');
    return;
  }

  setStatus('Checking which apps are cloned locally…');
  const statusMap = await detectAll(repos);

  allRepos = repos.map(repo => ({ repo, status: statusMap[repo.name] || 'unknown' }));

  const installed = allRepos.filter(r => r.status === 'installed').length;
  const total     = allRepos.length;

  if (window.location.protocol === 'file:') {
    setStatus(
      `Running via file:// — clone detection limited. Serve with a local server for full detection.`,
      'yellow'
    );
  } else {
    setStatus(`${installed} of ${total} apps installed locally`, 'green');
    setTimeout(hideStatus, 4000);
  }

  buildCategoryTabs(repos);
  renderAll();
}

// ─────────────────────────────────────────────────────────────
//  EVENT DELEGATION
// ─────────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  const getBtn = e.target.closest('.btn-get');
  if (getBtn) {
    const r = allRepos.find(r => r.repo.name === getBtn.dataset.repo);
    if (r) openSheet(r.repo);
  }
});

document.getElementById('btn-refresh').addEventListener('click', async () => {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  allRepos = [];
  await init();
  btn.classList.remove('spinning');
  showToast('Refreshed ✓');
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderAll();
});

document.querySelectorAll('.filter-tab').forEach(t =>
  t.addEventListener('click', () => setFilter(t.dataset.filter)));

document.getElementById('s-close').addEventListener('click', closeSheet);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeSheet();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

// ── Go ──
init();
</script>
</body>
</html>
